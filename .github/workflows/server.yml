name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studylog
          POSTGRES_PASSWORD: studylog
          POSTGRES_DB: studylog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: postgresql://studylog:studylog@localhost:5432/studylog_test
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-bytes-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-bytes-long
          ALLOWED_ORIGIN: http://localhost:5173
          BCRYPT_ROUNDS: 1
          LOG_LEVEL: silent
